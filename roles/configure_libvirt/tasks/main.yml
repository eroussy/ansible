---
- name: Copy libvirtd.conf
  ansible.builtin.template:
    src: libvirtd.conf.j2
    dest: /etc/libvirt/libvirtd.conf
    owner: root
    group: root
    mode: "0644"
  when:
    - configure_libvirt_allow_non_root_libvirt_socket_access
  notify: Restart libvirtd

# OracleLinux specific
- name: Enable and start virtsecretd.socket
  ansible.builtin.systemd:
    name: virtsecretd.socket
    state: started
    enabled: true
  when: seapath_distro == "OracleLinux"
- name: Enable and start virtqemud.socket
  ansible.builtin.systemd:
    name: virtqemud.socket
    state: started
    enabled: true
  when: seapath_distro == "OracleLinux"
- name: Enable and start virtstoraged.socket
  ansible.builtin.systemd:
    name: virtstoraged.socket
    state: started
    enabled: true
  when: seapath_distro == "OracleLinux"

- name: Ensure libvirt hooks/qemu.d directory exists
  ansible.builtin.file:
    path: /etc/libvirt/hooks/qemu.d/
    state: directory
    mode: '0755'
    owner: root
    group: root
  notify: Restart libvirtd

- name: Copy qemu_hook.py to libvirt qemu hook
  ansible.builtin.copy:
    src: qemu_hook.py
    dest: /etc/libvirt/hooks/qemu.d/seapath_qemu_hook.py
    mode: '0755'
    owner: root
    group: root
  notify: Restart libvirtd
