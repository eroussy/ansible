---
- name: Generate htpasswd file for registry authentication
  ansible.builtin.command: htpasswd -Bbn "{{ ceph_registry_username }}" "{{ ceph_registry_password }}"
  register: ceph_registry_htpasswd_output
  changed_when: true

- name: Create htpasswd file
  ansible.builtin.copy:
    content: "{{ ceph_registry_htpasswd_output.stdout }}"
    dest: "{{ ceph_registry_path }}/htpasswd"
    mode: '0600'
