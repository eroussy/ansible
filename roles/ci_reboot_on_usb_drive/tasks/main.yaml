---
- name: Copy configure_boot_next_usb_drive.sh script
  ansible.builtin.copy:
    src: configure_boot_next_usb_drive.sh
    dest: /tmp/configure_boot_next_usb_drive.sh
    mode: "0644"

- name: Configure the EFI to boot on USB drive
  become: true
  ansible.builtin.command: sh /tmp/configure_boot_next_usb_drive.sh
  register: ci_reboot_on_usb_drive_configure_boot_result
  changed_when: ci_reboot_on_usb_drive_configure_boot_result.rc == 0
  failed_when: ci_reboot_on_usb_drive_configure_boot_result.rc == 1 or ci_reboot_on_usb_drive_configure_boot_result.rc > 2

- name: Reboot the system
  become: true
  ansible.builtin.reboot:
    reboot_timeout: "{{ ci_reboot_on_usb_drive_reboot_timeout }}"
