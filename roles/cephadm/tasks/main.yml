---
- name: Check if host is part of a Ceph cluster
  ansible.builtin.command: cephadm ls
  register: cephadm_ls_output
  changed_when: false
  failed_when: false

- name: Mark host as ceph or nonceph
  ansible.builtin.set_fact:
    cephadm_is_ceph_node: >-
      {{
        cephadm_ls_output.rc == 0
        and (cephadm_ls_output.stdout | from_json | length) > 0
      }}

- name: Add host to ceph_nodes group
  ansible.builtin.add_host:
    name: "{{ item }}"
    groups: ceph_nodes
  run_once: true
  loop: "{{ groups['cluster_machines'] }}"
  when: hostvars[item].cephadm_is_ceph_node

- name: Add host to nonceph_nodes group
  ansible.builtin.add_host:
    name: "{{ item }}"
    groups: nonceph_nodes
  run_once: true
  loop: "{{ groups['cluster_machines'] }}"
  when: not hostvars[item].cephadm_is_ceph_node

- name: Set first_node and bootstrap condition
  ansible.builtin.set_fact:
    cephadm_first_node: >-
      {{ (groups['ceph_nodes'][0] if (groups['ceph_nodes'] is defined and groups['ceph_nodes'] | length > 0)
         else groups['cluster_machines'][0]) | trim }}
    cephadm_do_bootstrap: "{{ (groups['ceph_nodes'] | default([])) | length == 0 }}"
  run_once: true

- name: Compute list of nodes to add as monitors
  ansible.builtin.set_fact:
    cephadm_mon_nodes_to_add: "{{ (groups['nonceph_nodes'] | default([]) | difference([cephadm_first_node])) if cephadm_do_bootstrap else groups['nonceph_nodes'] | default([]) }}"
  run_once: true

- name: Debug situation
  ansible.builtin.debug:
    msg: |
      cephadm_first_node = {{ cephadm_first_node }}
      cephadm_do_bootstrap = {{ cephadm_do_bootstrap }}
      cephadm_mon_nodes_to_add = {{ cephadm_mon_nodes_to_add | default([]) }}
      ceph_nodes = {{ groups['ceph_nodes'] | default([]) }}
      nonceph_nodes = {{ groups['nonceph_nodes'] | default([]) }}
  run_once: true

# === Bootstrap if currently no ceph nodes ===
- name: Upload file ceph.conf needed for bootstrapping # noqa: risky-file-permissions
  ansible.builtin.template:
    src: ceph.conf.j2
    dest: /tmp/ceph.conf
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  when: cephadm_do_bootstrap | bool

- name: Find cephadm location
  ansible.builtin.command: which cephadm
  register: cephadm_path
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ ansible_env.PATH }}:/usr/local/bin"

- name: Set cephadm binary path
  ansible.builtin.set_fact:
    cephadm_bin: "{{ cephadm_path.stdout if cephadm_path.rc == 0 else '/usr/local/bin/cephadm' }}"

- name: Show bootstrap command
  ansible.builtin.debug:
    msg: >-
      {{ cephadm_bin }}
      --image localhost:5000/ceph:v{{ cephadm_release }}
      bootstrap
      --skip-monitoring-stack
      --skip-dashboard
      --skip-firewalld
      --config /tmp/ceph.conf
      --ssh-user cephadm
      --mon-ip {{ hostvars[cephadm_first_node]['cluster_ip_addr'] }}

- name: Bootstrap Ceph cluster
  ansible.builtin.command: >-
    {{ cephadm_bin }}
    --image localhost:5000/ceph:v{{ cephadm_release }}
    bootstrap
    --skip-monitoring-stack
    --skip-dashboard
    --skip-firewalld
    --config /tmp/ceph.conf
    --ssh-user cephadm
    --mon-ip {{ hostvars[cephadm_first_node]['cluster_ip_addr'] }}
  changed_when: true
  failed_when: false
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  register: cephadm_ceph_bootstrap_result
  when: cephadm_do_bootstrap | bool

- name: Show bootstrap result
  ansible.builtin.debug:
    var: cephadm_ceph_bootstrap_result

# === adding cephadm key on other nodes ===
- name: Check if /etc/ceph/ceph.pub exists on first_node
  ansible.builtin.stat:
    path: /etc/ceph/ceph.pub
  register: cephadm_ceph_pub_stat
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  when: cephadm_mon_nodes_to_add | length > 0

- name: Get cephadm user entry
  ansible.builtin.getent:
    database: passwd
    key: cephadm
  delegate_to: "{{ cephadm_first_node }}"
  run_once: true

- name: Fetch the ceph keyfile if it exists, otherwise fetch authorized_keys
  ansible.builtin.fetch:
    src: >-
      {{
        cephadm_ceph_pub_stat.stat.exists
        | ternary(
            '/etc/ceph/ceph.pub',
            getent_passwd['cephadm'][4] ~ '/.ssh/authorized_keys'
          )
      }}
    dest: "/tmp/ceph.pub"
    flat: true
  delegate_to: "{{ cephadm_first_node }}"
  run_once: true
  when: cephadm_mon_nodes_to_add | length > 0

- name: Read the key from the local file
  ansible.builtin.set_fact:
    cephadm_ceph_pubkey: "{{ lookup('file', '/tmp/ceph.pub') }}"
  delegate_to: localhost
  run_once: true
  when: cephadm_mon_nodes_to_add | length > 0

- name: Add the ceph pubkey to each target node
  ansible.posix.authorized_key:
    user: cephadm
    state: present
    key: "{{ cephadm_ceph_pubkey }}"
  with_items: "{{ cephadm_mon_nodes_to_add }}"
  loop_control:
    loop_var: target_node
  delegate_to: "{{ target_node }}"
  run_once: true
  when: cephadm_mon_nodes_to_add | length > 0

# === adding monitor on other nodes ===
- name: Add hosts to Ceph orchestrator with _admin label
  ansible.builtin.command: "ceph orch host add {{ hostvars[item]['hostname'] }} --labels _admin"
  loop: "{{ cephadm_mon_nodes_to_add }}"
  changed_when: true
  failed_when: false
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  when: cephadm_mon_nodes_to_add | length > 0

- name: Confirm monitors are in monmap
  ansible.builtin.command: ceph mon dump
  register: cephadm_mon_dump
  retries: 30
  delay: 5
  changed_when: false
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  until: "hostvars[item]['hostname'] in cephadm_mon_dump.stdout"
  loop: "{{ cephadm_mon_nodes_to_add }}"
  when: cephadm_mon_nodes_to_add | length > 0

# === OSDs now ===
# A volume is kept untouched if and only if it hosts an OSD that the
# running cluster claims: the OSD uuid found in the LVM tags written by
# ceph-volume must be registered in the cluster OSD map. Everything else
# listed as an OSD volume belongs to Ceph and is zapped before being
# added, which makes re-runs safe on live clusters and makes
# reinstallations and machine replacements re-enroll leftover volumes
# automatically.
- name: Set OSD volume candidates for this host
  ansible.builtin.set_fact:
    cephadm_osd_disks: >-
      {{ ceph_osd_disks
         if ceph_osd_disks is defined
         else ([ceph_osd_disk] if ceph_osd_disk is defined else []) }}

- name: Get the OSD map of the cluster
  ansible.builtin.command: ceph osd dump --format json
  register: cephadm_osd_dump
  changed_when: false
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"

- name: Set fact for OSD UUIDs registered in the cluster
  ansible.builtin.set_fact:
    cephadm_cluster_osd_uuids: "{{ (cephadm_osd_dump.stdout | from_json).osds | map(attribute='uuid') | list }}"
  run_once: true

- name: List ceph-volume OSDs of the host
  ansible.builtin.command: "{{ cephadm_bin }} --image localhost:5000/ceph:v{{ cephadm_release }} ceph-volume lvm list --format json"
  register: cephadm_cv_list
  changed_when: false
  failed_when: false
  when: cephadm_osd_disks | default([]) | length > 0

- name: Compute devices claimed by OSDs of the cluster
  ansible.builtin.set_fact:
    cephadm_claimed_devices: "{{ cephadm_osd_lvs | community.general.json_query(cephadm_claimed_query) | flatten }}"
  vars:
    cephadm_osd_lvs: >-
      {{ ((cephadm_cv_list.stdout | default('{}'))
          if (cephadm_cv_list.rc | default(1)) == 0 else '{}')
         | from_json | dict2items | map(attribute='value') | flatten | list }}
    cephadm_claimed_query: >-
      [?contains(`{{ cephadm_cluster_osd_uuids | to_json }}`, tags."ceph.osd_fsid")].[lv_path, devices]
  when: cephadm_osd_disks | default([]) | length > 0

- name: Get the real path of OSD volumes
  ansible.builtin.command: "realpath {{ item }}"
  loop: "{{ cephadm_osd_disks | default([]) }}"
  register: cephadm_osd_disks_realpath
  changed_when: false
  failed_when: false

- name: List the block device tree of each OSD volume
  ansible.builtin.command: "lsblk -lnpo NAME {{ item.stdout }}"
  loop: "{{ cephadm_osd_disks_realpath.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('') }}"
  register: cephadm_osd_disks_tree
  changed_when: false
  when: item.rc | default(1) == 0

- name: Select OSD volumes not claimed by the cluster
  ansible.builtin.set_fact:
    cephadm_osd_disks_to_zap: >-
      {{ cephadm_osd_disks_to_zap | default([])
         + ([item.item.item] if (item.rc | default(1)) == 0
            and item.item.item not in cephadm_claimed_devices
            and item.stdout_lines | intersect(cephadm_claimed_devices) | length == 0
            else []) }}
  loop: "{{ cephadm_osd_disks_tree.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item | default('') }}"

- name: Show OSD volumes that will be wiped
  ansible.builtin.debug:
    msg: "OSD volumes that will be wiped and given to Ceph: {{ cephadm_osd_disks_to_zap | default([]) }}"
  when: cephadm_osd_disks_to_zap | default([]) | length > 0

# Logical volumes are wiped in place (the volume belongs to the user);
# whole disks and partitions are destroyed so that ceph-volume can
# create its own LVM layer on them.
- name: Get the device type of OSD volumes to wipe
  ansible.builtin.command: "lsblk -ndo TYPE {{ item }}"
  loop: "{{ cephadm_osd_disks_to_zap | default([]) }}"
  register: cephadm_osd_zap_types
  changed_when: false

- name: Zap OSD volumes not claimed by the cluster
  ansible.builtin.command: >-
    {{ cephadm_bin }} --image localhost:5000/ceph:v{{ cephadm_release }}
    ceph-volume lvm zap {{ item.item }}{{ '' if (item.stdout | trim) == 'lvm' else ' --destroy' }}
  loop: "{{ cephadm_osd_zap_types.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Copy ceph orch spec file
  ansible.builtin.template:
    src: "{{ cephadm_spec_path | default('spec.yaml.j2') }}"
    dest: /tmp/t.yaml
    mode: "0644"
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"

- name: Add OSD daemon on nodes that need OSDs
  ansible.builtin.command: "{{ cephadm_bin }} --image localhost:5000/ceph:v{{ cephadm_release }} shell -v /tmp/t.yaml:/tmp/t.yaml:ro -- ceph orch apply -i /tmp/t.yaml"
  delegate_to: "{{ cephadm_first_node }}"
  run_once: true
  changed_when: true
  failed_when: false

- name: Confirm cluster is ok
  ansible.builtin.command: ceph status --format=json
  register: cephadm_cephs
  retries: 30
  delay: 10
  changed_when: false
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"
  until: cephadm_cephs.stdout | from_json | community.general.json_query('health.status') == "HEALTH_OK"

- name: Check if RBD pool exists
  ansible.builtin.shell:
    cmd: set -o pipefail && ceph osd lspools | grep -w rbd
    executable: /bin/bash
  register: cephadm_rbd_pool_check
  changed_when: false
  failed_when: false

- name: Create RBD pool if it doesn't exist
  ansible.builtin.command: ceph osd pool create rbd
  when: cephadm_rbd_pool_check.rc != 0
  changed_when: true
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"

- name: Enable RBD application on the pool
  ansible.builtin.command: ceph osd pool application enable rbd rbd
  when: cephadm_rbd_pool_check.rc != 0
  changed_when: true
  run_once: true
  delegate_to: "{{ cephadm_first_node }}"

- name: Check if CephX user client.libvirt exists
  ansible.builtin.command: ceph auth get client.libvirt
  register: cephadm_cephx_user_check
  changed_when: false
  failed_when: false

- name: Create CephX user client.libvirt if it does not exist
  ansible.builtin.command: >
    ceph auth add client.libvirt
    mon 'profile rbd, allow command "osd blacklist"'
    osd 'allow class-read object_prefix rbd_children, profile rbd pool=rbd'
  when: cephadm_cephx_user_check.rc != 0
  changed_when: true

- name: Update CephX user client.libvirt permissions if it exists
  ansible.builtin.command: >
    ceph auth caps client.libvirt
    mon 'profile rbd, allow command "osd blacklist"'
    osd 'allow class-read object_prefix rbd_children, profile rbd pool=rbd'
  when: cephadm_cephx_user_check.rc == 0
  changed_when: true

- name: Stop and remove Podman registry container
  containers.podman.podman_container:
    name: registry
    state: absent
