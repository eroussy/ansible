---

- name: Handle deprecated lvm_volumes layout
  ansible.builtin.include_tasks: legacy_lvm_volumes.yml
  when: lvm_volumes is defined

- name: Build the OSD disk list from ceph_osd_disk when needed
  ansible.builtin.set_fact:
    ceph_osd_disks: "{{ [ceph_osd_disk] if ceph_osd_disk is defined else [] }}" # noqa: var-naming[no-role-prefix]
  when:
    - lvm_volumes is not defined
    - ceph_osd_disks is not defined

- name: Validate OSD disks
  when: ceph_osd_disks | length > 0
  block:
    - name: Get the real path of OSD disks
      ansible.builtin.command: "realpath {{ item }}"
      loop: "{{ ceph_osd_disks }}"
      register: ceph_prepare_installation_realpaths
      changed_when: false
      failed_when: false
    - name: Fail if an OSD disk does not exist
      ansible.builtin.fail:
        msg: "The OSD disk {{ item.item }} does not exist."
      when: item.rc != 0
      loop: "{{ ceph_prepare_installation_realpaths.results }}"
      loop_control:
        label: "{{ item.item }}"
    - name: Get the mount points of OSD disks
      ansible.builtin.command: "lsblk -no MOUNTPOINT {{ item.stdout }}"
      loop: "{{ ceph_prepare_installation_realpaths.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: ceph_prepare_installation_mounts
      changed_when: false
    - name: Fail if an OSD disk is in use by the system
      ansible.builtin.fail:
        msg: >-
          The OSD disk {{ item.item.item }} holds mounted filesystems or swap
          ({{ item.stdout_lines | reject('equalto', '') | join(', ') }}):
          refusing to give it to Ceph.
      when: item.stdout | trim | length > 0
      loop: "{{ ceph_prepare_installation_mounts.results }}"
      loop_control:
        label: "{{ item.item.item }}"
