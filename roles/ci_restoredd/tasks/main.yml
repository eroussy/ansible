---
- name: Create /boot/efi/RESTORE_PLZ
  ansible.builtin.file:
    path: /boot/efi/RESTORE_PLZ
    state: touch
    mode: "0644"

# sync is required: reboot --force skips filesystem unmount, and the marker
# file may still sit in the page cache since the ESP is not mounted sync.
- name: Reboot the machine
  ansible.builtin.reboot:
    reboot_command: sync && systemctl reboot --force
    reboot_timeout: 1500
